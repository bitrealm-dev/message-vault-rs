name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sms-backup-plus-exporter
    steps:
      - name: Checkout exporter
        uses: actions/checkout@v4
        with:
          path: sms-backup-plus-exporter

      - name: Checkout message-json
        uses: actions/checkout@v4
        with:
          repository: bitrealm-dev/message-json
          path: message-json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets
